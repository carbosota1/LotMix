name: Lottery Runner (updates + analysis + alerts)

on:
  schedule:
    - cron: "*/15 * * * *"   # cada 15 minutos
  workflow_dispatch:

concurrency:
  group: lottery-runner
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
   env:
  TZ: America/Santo_Domingo
  PYTHONPATH: src
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}


    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run lottery system
        run: |
          python src/runner.py

      - name: Commit updated histories and outputs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          git add data/histories outputs data/state.json || true
          git commit -m "Auto update histories + analysis" || echo "No changes"
          git push
